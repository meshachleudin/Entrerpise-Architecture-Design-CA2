apiVersion: v1
kind: ConfigMap

metadata:
  name: loki-loki-stack
  namespace: monitoring
  labels:
    app: loki-stack
    chart: loki-stack-2.10.3
    release: loki
    heritage: Helm
    grafana_datasource: "1"
  annotations:
    meta.helm.sh/release-name: loki
    meta.helm.sh/release-namespace: monitoring

data:
  loki-stack-datasource.yaml: |-
    apiVersion: 1

    datasources:
      - name: Loki
        type: loki
        access: proxy
        url: http://loki:3100
        isDefault: false
        editable: true

        jsonData:
          maxLines: 1000