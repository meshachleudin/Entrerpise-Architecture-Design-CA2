apiVersion: v1
kind: ConfigMap

metadata:
  name: loki-loki-stack
  namespace: monitoring
  labels:
    app: loki-stack
    app.kubernetes.io/managed-by: Helm
    chart: loki-stack-2.10.3
    grafana_datasource: "1"
    heritage: Helm
    release: loki

  annotations:
    meta.helm.sh/release-name: loki
    meta.helm.sh/release-namespace: monitoring

data:
  loki-stack-datasource.yaml: |-
    apiVersion: 1

    datasources:
      - name: Loki
        type: loki
        access: proxy
        url: http://loki:3100
        isDefault: true
        editable: true

        jsonData:
          maxLines: 1000